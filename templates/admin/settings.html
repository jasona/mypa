{% extends "admin/base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="panel">
    <h2>Effective Settings Summary</h2>
    <p class="muted">Secrets are intentionally omitted or reduced to booleans.</p>
    <table>
        <thead>
            <tr>
                <th>Setting</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody>
        {% for key, value in config_summary.items() %}
            <tr>
                <td>{{ key }}</td>
                <td>{{ value }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
